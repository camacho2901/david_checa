<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00457A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Borde -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#00D4FF" stroke-width="2"/>
  
  <!-- Texto DC -->
  <text x="50" y="50" font-family="Montserrat, Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">
    DC
  </text>
  
  <!-- Icono de cerebro pequeño (opcional) -->
  <path d="M50 20 Q45 18 42 20 Q40 22 40 25 Q40 28 42 30 Q45 32 50 30 Q55 32 58 30 Q60 28 60 25 Q60 22 58 20 Q55 18 50 20 Z" fill="#00D4FF" opacity="0.3"/>
</svg>
